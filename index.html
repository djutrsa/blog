<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#150A18">
<title>DJ's Essays</title>
<meta name="description" content="Essays on games and the business behind them.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=IBM+Plex+Mono:wght@400;600&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#150A18; --ink:#EBE6D7; --ink-dim:rgba(235,230,215,.6);
    --hair:rgba(235,230,215,.16); --red:#E0503C; --yellow:#EFC257;
    --stripe:linear-gradient(90deg,#5BC6DB 0 25%,#3FB36F 25% 50%,#EFC257 50% 75%,#E0503C 75% 100%);
  }
  *{box-sizing:border-box}
  body{
    margin:0;min-height:100vh;background:var(--bg);color:var(--ink);
    font-family:"Newsreader",Georgia,serif;
    display:flex;flex-direction:column;
  }
  ::selection{background:var(--yellow);color:var(--bg)}
  .wrap{max-width:42rem;margin:0 auto;padding:0 1.375rem;width:100%;flex:1}
  header{padding:clamp(4.5rem,12vh,7rem) 0 2.5rem}
  .kicker{
    font-family:"IBM Plex Mono",monospace;font-size:.7rem;font-weight:600;
    letter-spacing:.22em;text-transform:uppercase;color:var(--ink-dim);
    display:flex;align-items:center;gap:.65rem;margin:0 0 1.4rem;
  }
  .kicker::before{content:"";width:1.9rem;height:3px;background:var(--stripe);flex:none}
  h1{
    font-family:"Bricolage Grotesque",Georgia,serif;font-weight:800;
    font-size:clamp(2rem,5vw,3rem);line-height:1.05;letter-spacing:-.015em;margin:0;
  }
  ul{list-style:none;margin:2.5rem 0 0;padding:0}
  li{border-top:1px solid var(--hair)}
  a.post{
    display:block;padding:1.6rem .25rem;color:inherit;text-decoration:none;
  }
  a.post:hover .t{color:var(--yellow)}
  .t{
    font-family:"Bricolage Grotesque",Georgia,serif;font-weight:800;
    font-size:1.35rem;line-height:1.2;letter-spacing:-.01em;transition:color .15s;
  }
  .t .accent{color:var(--red)}
  .m{
    font-family:"IBM Plex Mono",monospace;font-size:.66rem;letter-spacing:.18em;
    text-transform:uppercase;color:var(--ink-dim);margin-top:.6rem;
  }
  footer{margin-top:4rem}
  footer .bar{height:3px;background:var(--stripe)}
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <p class="kicker">Games &middot; Business</p>
      <h1>Essays</h1>
    </header>
    <ul>
      <li>
        <a class="post" href="arc-raiders/">
          <div class="t">Arc Raiders isn't dying of bad design. <span class="accent">It's dying of opportunity cost.</span></div>
          <div class="m">June 11, 2026 &middot; 9 min read</div>
        </a>
      </li>
    </ul>
  </div>
  <footer><div class="bar"></div></footer>
</body>
</html>
